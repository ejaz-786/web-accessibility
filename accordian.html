<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .skip-link {
        position: absolute;
        top: -40px;
        background-color: black;
        color: white;
        padding: 8px;
        z-index: 100;
        outline: 1px solid red;
        outline-offset: -3px;

        &:focus {
          top: 0;
          outline: 1px solid blue;
          margin: 10px;
        }
      }
      .accordion-trigger {
        width: 100%;
        text-align: left;
        padding: 15px;
        cursor: pointer;
        border: 1px solid #ccc;
        background: #f9f9f9;
      }

      /* Jab Tab se focus aaye toh ye style dikhega */
      .accordion-trigger:focus-visible {
        outline: 3px solid #2563eb;
        outline-offset: -3px;
        background: #eff6ff;
      }

      .accordion-content {
        padding: 15px;
        border: 1px solid #ccc;
        border-top: none;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header><h1>Accordian</h1></header>
    <main id="main-content">
      <div class="accordion">
        <div class="accordion-item">
          <button
            id="accordion-header-1"
            aria-expanded="false"
            aria-controls="accordion-panel-1"
            class="accordion-trigger"
          >
            What is Keyboard Accessibility?
          </button>
          <div
            id="accordion-panel-1"
            role="region"
            aria-labelledby="accordion-header-1"
            class="accordion-content"
            hidden
          >
            <p>
              Keyboard accessibility is the practice of making websites usable
              without a mouse.
            </p>
          </div>
        </div>

        <div class="accordion-item">
          <button
            id="accordion-header-2"
            aria-expanded="false"
            aria-controls="accordion-panel-2"
            class="accordion-trigger"
          >
            Why is ARIA important?
          </button>
          <div
            id="accordion-panel-2"
            role="region"
            aria-labelledby="accordion-header-2"
            class="accordion-content"
            hidden
          >
            <p>
              ARIA helps screen readers understand the state and purpose of
              custom elements.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script>
      const triggers = document.querySelectorAll(".accordion-trigger");

      triggers.forEach((trigger, index) => {
        trigger.addEventListener("click", () => {
          const isExpanded = trigger.getAttribute("aria-expanded") === "true";

          // Toggle state
          trigger.setAttribute("aria-expanded", !isExpanded);

          // Toggle content visibility
          const content = document.getElementById(
            trigger.getAttribute("aria-controls"),
          );
          content.hidden = isExpanded;
        });

        // Keyboard Navigation: Up/Down Arrows
        trigger.addEventListener("keydown", (e) => {
          let newIndex;
          if (e.key === "ArrowDown") {
            newIndex = (index + 1) % triggers.length;
            triggers[newIndex].focus();
          } else if (e.key === "ArrowUp") {
            newIndex = (index - 1 + triggers.length) % triggers.length;
            triggers[newIndex].focus();
          }
        });
      });
    </script>
  </body>
</html>
